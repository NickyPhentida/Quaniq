<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0A1B6A"/>
      <stop offset="100%" stop-color="#050A3A"/>
    </radialGradient>

    <!-- Neon gradient -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="50%" stop-color="#4DA3FF"/>
      <stop offset="100%" stop-color="#2979FF"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="16" cy="16" r="12"
          fill="none"
          stroke="url(#neon)"
          stroke-width="1.8"
          filter="url(#glow)"/>

  <!-- Orbit line -->
  <ellipse cx="16" cy="16" rx="14" ry="6"
           fill="none"
           stroke="url(#neon)"
           stroke-width="1.5"
           transform="rotate(-20 16 16)"
           filter="url(#glow)"/>

  <!-- QNQ Text -->
  <text x="16" y="19"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9"
        font-weight="900"
        fill="url(#neon)"
        filter="url(#glow)">
    QNQ
  </text>
</svg>